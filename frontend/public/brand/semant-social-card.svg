<svg viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Semant — read images, part by part">
  <defs>
    <linearGradient id="paper" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#FAF7F5"/>
      <stop offset="1" stop-color="#F3ECEF"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#paper)"/>
  <!-- faint region-mark motif, top-right -->
  <g opacity="0.06" stroke="#5E2B50" fill="none" stroke-width="4">
    <rect x="880" y="-40" width="360" height="360" rx="60" transform="rotate(-9 1060 140)"/>
    <rect x="980" y="360" width="180" height="150" rx="30" transform="rotate(-9 1070 435)"/>
  </g>
  <!-- the mark -->
  <g transform="translate(96 96) scale(1.9)">
    <rect x="3" y="3" width="52" height="52" rx="12" fill="none" stroke="#5E2B50" stroke-width="3.4"/>
    <rect x="14" y="20" width="26" height="22" rx="6" transform="rotate(-9 27 31)" fill="#5E2B50"/>
    <line x1="42" y1="42" x2="55" y2="55" stroke="#5E2B50" stroke-width="2.6" stroke-linecap="round"/>
    <circle cx="58" cy="58" r="4.4" fill="none" stroke="#5E2B50" stroke-width="2.6"/>
  </g>
  <text x="230" y="176" font-family="Fraunces, Georgia, 'Times New Roman', serif" font-size="88" font-weight="600" fill="#191419" letter-spacing="-2">Semant</text>
  <text x="96" y="360" font-family="Fraunces, Georgia, serif" font-size="52" font-weight="500" fill="#191419" letter-spacing="-1">Read images, part by part.</text>
  <text x="96" y="430" font-family="Inter, -apple-system, sans-serif" font-size="30" fill="#5B5158" letter-spacing="-0.2">The neckline, the drape, the light — Semant reads with you,</text>
  <text x="96" y="472" font-family="Inter, -apple-system, sans-serif" font-size="30" fill="#5B5158" letter-spacing="-0.2">and writes from what you noticed.</text>
  <text x="96" y="556" font-family="Inter, -apple-system, sans-serif" font-size="26" font-weight="600" fill="#5E2B50" letter-spacing="0.4">Your taste, written down.</text>
</svg>
