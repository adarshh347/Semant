<!-- @dsCard group="Components" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Navigation — Drishtikone</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="tokens.css">
<style>
  .stage { padding: var(--space-8); display: flex; flex-direction: column; gap: var(--space-6); }
  .nav {
    display: flex; align-items: center; justify-content: space-between;
    padding: var(--space-4) var(--space-6);
    background: var(--surface); border: 1px solid var(--line);
    border-radius: var(--radius-pill); box-shadow: var(--shadow-sm);
  }
  .brand { font-family: var(--font-display); font-size: 1.4rem; font-weight: 600; display: flex; align-items: center; gap: var(--space-2); }
  .brand .mark { width: 22px; height: 22px; border-radius: 50%; background: var(--accent); display: inline-block; box-shadow: inset -4px -4px 0 rgba(0,0,0,0.12); }
  .links { display: flex; align-items: center; gap: var(--space-6); }
  .links a { font-size: var(--fs-small); font-weight: 500; color: var(--ink-muted); text-decoration: none; transition: color 0.2s var(--ease); }
  .links a:hover { color: var(--ink); }
  .links a.active { color: var(--ink); position: relative; }
  .links a.active::after { content:""; position:absolute; left:0; right:0; bottom:-6px; height:2px; background:var(--accent); border-radius: 2px; }
  .right { display: flex; align-items: center; gap: var(--space-3); }
  .toggle { width: 38px; height: 38px; border-radius: 50%; border: 1px solid var(--line); background: var(--surface-2);
            display: grid; place-items: center; cursor: pointer; color: var(--ink-muted); }
  .caption { color: var(--ink-subtle); font-size: var(--fs-caption); padding-left: var(--space-4); }
</style>
</head>
<body>
  <div class="stage">
    <div class="caption">Floating pill nav — translucent over hero, solid on scroll. Light theme:</div>
    <nav class="nav">
      <div class="brand"><span class="mark"></span> Drishtikone</div>
      <div class="links">
        <a class="active">Gallery</a>
        <a>Highlights</a>
        <a>Feed</a>
        <a>Epics</a>
      </div>
      <div class="right">
        <button class="toggle" aria-label="Toggle theme">☾</button>
        <button class="btn btn-primary btn-sm">Upload</button>
      </div>
    </nav>

    <div class="caption">Dark theme:</div>
    <div data-theme="dark" style="background:var(--bg); padding:var(--space-6); border-radius:var(--radius-lg);">
      <nav class="nav">
        <div class="brand"><span class="mark"></span> Drishtikone</div>
        <div class="links">
          <a class="active">Gallery</a>
          <a>Highlights</a>
          <a>Feed</a>
          <a>Epics</a>
        </div>
        <div class="right">
          <button class="toggle" aria-label="Toggle theme">☀</button>
          <button class="btn btn-primary btn-sm">Upload</button>
        </div>
      </nav>
    </div>
  </div>
</body>
</html>
