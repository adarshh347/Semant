design_ref: "R2/HW-C6-kinship-pull-probe-design.md"

question: >
  Given one fixed pair of images, presented in a fixed order in a single call, does an assertion
  that the two SHARE A MOTIF come from the pictures, from the fact of being asked about them
  TOGETHER, or from the KINSHIP VOCABULARY of the question itself?

relation_to_007: >
  007 resolved spark-06 for ADDRESS vocabulary and said so at deliberately narrow scope: the face
  was in the question, not the photograph. 007's own sparks.md stated the limit this run exists to
  close — "not resolved: whether other relational vocabularies (kinship, motif similarity) carry
  the same pull." This run tests the exact noun A6's stage-2 analogy uses.

