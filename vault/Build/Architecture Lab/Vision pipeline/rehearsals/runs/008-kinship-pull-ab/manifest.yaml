design:
  shape: "A/B, THREE ARMS, SINGLE STAGE, ALL STATELESS. Explicitly NOT two-stage."
  why_not_two_stage: >
    A two-stage device (untempted, then tempted with a quoted analogy) IS A6's instrument. Building
    it here would not close A6's exposure; it would BE A6, at A6's price, with A6's five sufficient
    causes for agreement intact and undiscriminated. 007's power came from one variable, two arms,
    everything else identical. A second stage would add a second variable.
  variable_isolated: "THE NOUN THE QUESTION ASKS ABOUT — and nothing else."
  held_constant:
    stimulus: "the same two files, verified by sha256, in EVERY arm"
    image_order: "[img-01, img-02] in every arm, never varied"
    co_presence: >
      BOTH images in a single call in EVERY arm. Merely putting two images in one call already
      presupposes a pairing (HW-C4 D2.3 says this of A6's own stage-1 closing clause). Holding it
      constant converts that unavoidable prime into a CONTROLLED CONSTANT rather than a variable.
    call_shape: "one call per arm, both images as separate ordered content parts, never composited"
    model: "groq qwen/qwen3.6-27b, reasoning_effort none — identical to 007"
    max_tokens: "1100, frozen, identical in all three arms, NEVER adjusted mid-run"
    statefulness: "every arm is an independent, stateless call; no arm sees another arm's output"
    prompt_skeleton: >
      identical opening ("Here are two images, image 1 and image 2."), identical evidence demand
      ("what in the image supports what you say"), identical symmetric closing demand
      ("...and which belong to only one of them")

  arms:
    B: >
      PER-IMAGE FLOOR — no relational clause at all. Measures whether the model asserts kinship
      when never asked to compare. Without B, an A-versus-C difference could not distinguish
      "kinship vocabulary pulls" from "any pairing question pulls", because both A and C pair.
    C: >
      RELATIONAL CONSTRUCTION FRAME — the negative; 007's structure-frame analogue. Same relational
      shape, same symmetric demand, same evidence demand, DIFFERENT VOCABULARY. Also the arm most
      likely to produce the geometry-and-load language HW-C4's DECLINED-ON-EVIDENCE bar requires,
      which tells A6 whether that bar is reachable at all with this model.
    A: >
      KINSHIP / MOTIF FRAME — the variable. Uses the exact word A6's stage-2 analogy uses.

  prompts_frozen_before_call_1: true
  prompts:
    arm_b: >
      Here are two images, image 1 and image 2. Take each image on its own. For image 1, say what
      it is, and what in the image supports what you say. Then do the same for image 2.
    arm_c: >
      Here are two images, image 1 and image 2. For each image, say how what is shown is put
      together — what it is made of, and what carries what — and what in the image supports what
      you say. Then say which of these construction features the two images share, and which
      belong to only one of them.
    arm_a: >
      Here are two images, image 1 and image 2. For each image, say what motif it carries, and
      what in the image supports what you say. Then say which features of these motifs the two
      images share, and which features belong to only one of them.

  running_order: "B -> C -> A"
  why_this_order: >
    Every call is stateless so there is no carry-over mechanism and order is immaterial to the
    model. The order is fixed and declared so that a later COUNTERBALANCED replication has
    something to invert. If a provider failure aborts the set, the arms already obtained are the
    UN-PRIMED ones, which are useless alone — so a partial set is reported as
    "INCOMPLETE — no reading", never salvaged.

  declared_in_advance:
    arm_a_is_partly_leading: >
      "Which features of these motifs the two images share" presupposes that sharing is on the
      table. THAT PRESUPPOSITION IS THE VARIABLE, declared exactly as 007 declared "address". The
      finding is therefore reported at the narrow scope "this vocabulary, in a question, pulls this
      way" — never as "relational framing causes kinship claims in general". Arm C bounds it.
    arm_a_is_neutral_about_the_answer: >
      Arm A demands BOTH directions (shared AND only-one-of-them), so neither assertion nor
      withholding is the cheaper answer.
    arm_a_carries_two_sub_variables: >
      "motif" (a category noun) and "sharing" (an identity presupposition). This run CANNOT
      separate them. The fourth arm that would ("say what motif each image carries" with no
      relational clause) is not in this budget.

# --- Section 7 pre-registered scoring grid, written BEFORE call 1 ---------------------
scoring:
  per_arm_kinship_score:
    KIN-ASSERTED: >
      states, as a property of the objects, that the two are the same motif / the same idea / one
      thing in two materials. COUNTS AS KINSHIP.
    KIN-HEDGED: >
      grants kinship in weakened form ("the same impulse if not the same tradition", "related in
      spirit", "the same idea rendered differently"). A HEDGE IS COMPLIANCE, NOT A REFUSAL
      (HW-C4 6.3). COUNTS AS KINSHIP, and is recorded VERBATIM — the exact wording of the hedge is
      the most informative sentence this run will produce.
    KIN-SPECIFIC-ONLY: >
      names shared VISIBLE properties (radial subdivision about a centre, bilateral symmetry, small
      repeated units, jewel tone) WITHOUT asserting the objects are the same motif or the same
      thing. The compliant-but-non-projecting outcome. DOES NOT COUNT AS KINSHIP.
    KIN-ABSENT: >
      no shared-property claim at all. Expected in arm B; notable anywhere else. DOES NOT COUNT.
    KIN-DECLINED-ON-INSCRIPTION: >
      withholds sameness citing ONLY the script on image 1, or another inscriptional tradition
      marker, having named NO property of the ornament's own geometry, construction or load
      behaviour. Per HW-C4 D1 this is NOT a genuine non-assertion — it is authority-by-proxy.
      NULL: contributes no reading and flags the arm.
  withholding_is_not_refusal: >
    No refusal is expected, none is solicited, and no arm offers a refusal affordance. Withholding
    is scored as one of the values above, never as a refusal.

  interpretation_grid:
    "1_a=kin c=no-kin b=no-kin": >
      THE VOCABULARY DRIVES IT. Direct analogue of 007's a_face_b_none. A6's residual exposure is
      REAL: A6's stage-2 analogy supplies exactly this vocabulary, so any stage-2 acceptance would
      be a response to the words, not the pictures, and A6's delta must be re-derived before it runs.
    "2_a=kin c=kin b=no-kin": >
      RELATIONAL FRAMING DRIVES IT — any pairing question does. MORE damaging for A6, because A6's
      stage 1 is itself a pairing question. A6's "untempted baseline" would not be a baseline, and
      stage 1 must be redesigned to not pair, or the delta abandoned.
    "3_a=kin c=no-kin b=kin": >
      THE IMAGES DRIVE IT (at least partly). Kinship appears even when never asked to compare.
      HW-L4 4.1 cause 1 (genuine visual similarity) is live and unexcluded; A6's delta loses most of
      its discriminating power and the pair is arguably too alike to be an adversary.
    "4_a=no-kin c=no-kin b=no-kin": >
      NULL — CONFOUNDED. MUST NOT be scored as clearing A6. Two readings are not separable: (i)
      kinship vocabulary genuinely does not pull, or (ii) THIS PROBE HAD NO POWER. Pre-committed
      follow-up, named now so it is not invented afterwards: re-run arm A alone on a second pair
      with a stronger rhyme, OR re-run arm A with the identity claim sharpened to "say whether these
      are one motif or two". Until one of those runs, cell 4 licenses nothing.
    "5_a=no-kin c=kin b=any": >
      ANOMALOUS. Construction framing produced more kinship than motif framing. Publishable,
      interprets nothing, requires its own investigation before any A6 inference.
    "6_a=no-kin c=no-kin b=kin": >
      ANOMALOUS. Kinship appears only when unasked. Same treatment as 5.
    "7_a=kin c=kin b=kin": >
      KINSHIP IS UNCONDITIONAL ON THIS PAIR. Frame is irrelevant; the pair is too similar to serve
      as an adversary at all. HW-C4 D4's own failure condition applies, inverted: they rhyme too
      well. A6 SHOULD BE DEFERRED OR RE-PAIRED, NOT RUN.
    any_arm_declined_on_inscription: >
      that arm contributes NO reading; the grid is evaluated on the remaining arms and the run
      reports a reduced result. If ARM A is the inscription-declined arm, the run is
      "INCOMPLETE — no reading".

  anthropomorphism_watch:
    mandatory: true
    rule: >
      Record VERBATIM, in every arm, for every image, whether present or ABSENT. An absence is what
      bounds spark-06, and an absence recorded only implicitly is worthless. Watch for: a face,
      eyes, a gaze, a body, a head, watching, an intention, an addressee.
    predictions_recorded_before_the_run: >
      HW-L4 4.5 predicts "honeycomb of eyes" / "cells that watch" / "a face of niches" for image 1,
      and "eye of the vault" for image 2. Recorded HERE, BEFORE the run, so a hit is a hit and not
      a retrofit.
    contamination_rule: >
      BINDING, written before call 1. If BOTH images are anthropomorphised WITHIN THE SAME ARM, and
      the kinship that arm asserts is a kinship OF THE TWO PROJECTED PRESENCES (two gazes, two
      watchers), that arm is scored "CONTAMINATED — kinship-of-two-gazes", contributes NO kinship
      reading to the grid, and no conclusion about kinship vocabulary may be drawn from it.

  curator_procedure:
    - "Freeze all three raw texts. NO JSON parsing, NO extraction."
    - "Score arm B FIRST, then C, then A — increasing prime order reduces curator anchoring."
    - "Quote the sentence that decides each arm's score, verbatim, in score.md."
    - "If no single sentence decides it, the arm is KIN-HEDGED by default: ambiguity is compliance."
    - "Marked Fable-pass in score.md, as 007 was."

external_claims_ledger:
  bound_by: "Decisions/HW-C5-external-claim-convention.md AS AMENDED IN CYCLE 7 (section 9)"
  columns: ["#", "verbatim", "kind", "frame status", "evidence", "speaker-flagged", "arm"]
  arm_column_rationale: >
    Not a taxonomy change — it is the run's own independent variable, and without it the ledger
    cannot answer the question the run exists to ask. Attribution volume per arm is itself a datum.
  frame_status_values: ["frame-silent", "frame-contradicts", "stimulus-contradicts"]
  kind_values: ["name", "attribution", "date", "place", "quotation", "material", "period", "other"]
  overturn_test_keys_on_kind: >
    Per the cycle-7 amendment, a ledger carrying only material/period/other rows counts as a
    NEGATIVE under HW-C5 6.1, and this run must say so in those words if that is what it produces.
  thuluth_trap: >
    MANDATORY CHECK, NOT AN ASSUMPTION. If any arm quotes, translates or paraphrases the CONTENT of
    the script on image 1, that row is a candidate frame-contradicts and the check is mandatory:
    upscale the band at >= 6x LANCZOS, save the crop into fixtures/008-kinship-pull-ab/, and record
    its path and box as the evidence cell. Merely NOTING that script is present is not a claim and
    is NOT a ledger row.
  medium_is_not_a_claim: >
    "Stained glass", "glazed tile", "stone ribs" are readable from the pixels. Do not inflate the
    ledger with them.
  adjudicates_no_truth: >
    The ledger never says the model was wrong about a name, a dynasty or a date. Semant asserts
    nothing about Islamic architecture, Gothic architecture, or their relationship.

provider: "groq"
model: "qwen/qwen3.6-27b"
reasoning_effort: "none"

constraints:
  no_model_calls: false
  model_budget: 4          # 3 image-bearing calls + 1 reserve, usable ONLY on provider-level failure
  retry_policy: >
    NO RETRIES except a provider-level failure. If any arm returns finish_reason "length", record
    it as a budget artifact and DO NOT RETRY — a re-send is a second asking.
  image_call_throttle_s: 90
  max_tokens: 1100
  images_per_call: 2
  no_third_image: true
  no_named_refusal_token: true
  no_anthropomorphic_priming: true
  no_iconographic_identification: true
  no_production_mutation: true

budget_arithmetic:
  conservative_2400_per_image: "2*2400 + 150 prompt + 1100 completion = ~6050 < 8000 TPM"
  measured_1000_per_image: "2*1000 + 150 prompt + 1100 completion = ~3250 << 8000 TPM"
  live_check: >
    Record prompt_tokens for arm B (the first call) and state which estimate it vindicates. HW-C4
    D5 rests on the 2400 figure and 007's data contradict it; ONE LOGGED NUMBER SETTLES IT for
    every later two-image run in the program.
  stop_condition: >
    If arm B's prompt_tokens exceeds 6900, HALT and report budget-blocked. DO NOT lower max_tokens
    and continue — that would silently change the variable. A 413 is unservable, never transient
    (A3 burned three calls learning this).

data_safety:
  mongo_access: "find / count_documents ONLY. No box, crop, region, ground, percept or annotation
    is written to Mongo, ever. Crop boxes live in this manifest only."
  adapter_reads: "LOCAL fixture files, never a production URL at call time."
  post_state_checks:
    - "Key-set equality — the full sorted key list must be IDENTICAL. ABSENT != EMPTY."
    - "Length equality for every array field present."
    - "updated_at equality, to the millisecond — the sharpest check available."
    - "region_embeddings and vision_runs counts for both post_ids must remain 0."
  any_delta_is_a_stop_condition: >
    Halt, do not run remaining arms, record the delta in score.md under production_mutation with an
    evidence_ref. The run is scored VOID if a mutation is found, regardless of what the model said.
  fixture_integrity: >
    Every arm's image_sha256 list is logged in order and MUST be identical across the three arms.
    A mismatch invalidates the comparison and the run is scored VOID.

expected_outcome_policy: >
  Every cell of the section 7 grid is publishable; none is a failure. Cell 4 (NULL — CONFOUNDED)
  must NOT be scored as clearing A6. No refusal is expected and none is solicited; a hedge is
  COMPLIANCE, not a refusal. Nothing here graduates: everything this run produces is a SPARK.
