initiating_act:
  actor: "human"
  kind: "gesture_and_address"
  payload: "where does this gesture's address go?"

source_notes:
  why_selected: >
    Portfolio row A3. The neighbour was chosen by a curator on GESTURE grounds - both figures throw
    the head back with the face withheld from the viewer (bound by fabric in one, eyes closed and
    veiled in the other). Nothing about their surfaces is alike: the subject is a warm-toned oil
    painting (mean saturation 0.192), the neighbour a PURE GREYSCALE photograph (mean saturation
    0.0000). On the colour/material axis F6 documented as dominant, this pair is maximally unlikely.
  negative_selection: >
    695be843 shares the subject's low-key darkness (87.9% of pixels below luminance 64, vs 65.7%
    for the subject) but contains no figure at all, so no address is possible.
  embedding_counterfactual_is_UNTESTABLE: >
    The subject has 37 region embeddings; the neighbour and the negative have ZERO. There is
    nothing to run a similarity query against, so this rehearsal may NOT claim that an embedding
    would have ranked the negative above the neighbour. It reasons only from F6's documented
    material/colour dominance and labels the counterfactual untested. Note also that raw
    chromaticity distance actually places the neighbour CLOSER to the subject (0.0494) than the
    negative (0.0697), so the naive form of that argument is wrong; the real divergence is medium,
    saturation and texture.
  probe_downscaling: >
    Probe variants are capped at 768px on the long edge and hashed separately. All three images
    were treated identically so none is privileged. The negative's original is 1366x2048 and would
    otherwise have consumed a large share of the 8000 TPM ceiling on its own. Originals are frozen
    unmodified in the fixture root.
  two_region_generations: >
    The subject carries TWO coexisting region generations - fseg_* (7) and fine_* (9), 16 total -
    unlike post 695be786 where arch_* REPLACED fine_* and stranded two grounds. Re-dissection does
    not always replace. Neither generation is disturbed here.

provider: "groq"
model: "qwen/qwen3.6-27b"
reasoning_effort: "none"

constraints:
  technical_silence: false
  no_model_calls: false
  model_budget: 2
  retry_policy: "no retries except a provider-level failure of the first call (then 1 extra)"
  image_call_throttle_s: 65
  no_named_refusal_token: true
  no_iconographic_identification: true
  no_embedding_selected_comparison: true
  no_production_mutation: true
  time_budget: null

expected_outcome_policy: >
  Valid outcomes: (a) a SPARK for expressing address/orientation as something that is neither a
  region nor a similarity score, (b) evidence that an existing construct suffices - `relation`
  grounds already reference members by id and carry a relation_label, and A2's most useful finding
  was of exactly this shape, (c) an honest stall if address cannot be evidenced from single frames
  without importing iconography, or (d) a natural, unprompted refusal - which is a result and must
  never be re-prompted into compliance. SPARK only; no graduation.
