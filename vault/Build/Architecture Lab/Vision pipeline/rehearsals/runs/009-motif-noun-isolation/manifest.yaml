source_notes:
  reuses_008_bytes: >
    Both fixture files are byte-identical to run 008, verified by sha256 at call time and logged in
    the observation. This is a REQUIREMENT, not a convenience: the run's only claim comes from
    comparing its single arm against 008's arm A and arm B on the same stimulus.
  is_not_a6: >
    This run states no analogy, quotes no third party, supplies no curator attributions, and scores
    no refusal. It does NOT consume A6's Pair 2 further than 008 already did — 008 declared the
    pre-spend, and this run adds a third look at the same already-seen pair. A6 must record that
    its own stage 1, if bought fresh, would be a FOURTH look.
