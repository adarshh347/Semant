# RESEARCH-ONLY single-call follow-up to run 008. Not a new breadth family.
# Creates no production entity, route, schema, collection, or corpus write.
# This is the "fourth arm" named in 008's design section 9.3 and in
# runs/008-kinship-pull-ab/sparks.md unresolved-question 1.
rehearsal_id: "009-motif-noun-isolation"
rehearsal_type: "single-arm-isolation-followup"
family: "Instrument check (serves R12; isolates the noun from the identity presupposition)"
mode: "instrumented"
reconstructed: false
conducted_by: "opus (execution); design and scoring marked Fable-pass in score.md"
source_condition: "present"

dates:
  date_original: "2026-07-22"
  date_imported: "2026-07-22"

design_ref: "runs/008-kinship-pull-ab/ (section 9.3 of R2/HW-C6-kinship-pull-probe-design.md)"

question: >
  Run 008 arm A moved ONE word but carried TWO sub-variables: "motif" (a category noun) and
  "sharing" (an identity presupposition), and could not separate them. This run separates them.
  It asks arm A's question with the RELATIONAL CLAUSE REMOVED. If the model asserts a shared motif
  ANYWAY, the NOUN carries the pull. If it names two per-image motifs and stops, the
  PRESUPPOSITION carries it.

why_it_matters: >
  A6's stage-2 analogy ("the same motif rendered in tile and in glass") supplies BOTH the noun and
  the sameness assertion, plus a third-party attribution. 008 established that the combination is
  an attractor. Until the noun and the presupposition are separated, A6 cannot attribute a stage-2
  agreement to its own instrument rather than to its wording. This is one call; A6 is not.

