# DELIBERATE DEVIATION FROM 010's MANIFEST — and it changes nothing about the measurement.
# 010 (and ten other instrumented runs) record `source_condition: "present"` while supplying
# zero texts. FS-002 established that the field is DEFINED in R1-schema-decisions.md as
# "whether the source was there", so `present` is simply wrong on those runs. Those runs are
# frozen evidence and are NOT edited (HW-C6: "do not retro-fill the runs"). This NEW run sets
# the field honestly. `source_condition` is manifest metadata only: it touches no prompt, no
# image, no parameter, and cannot affect the repeat's verbatim status.
source_condition: "absent"
source_condition_note: >
  Set to "absent" because this run supplies no source text — seed_constellation.texts is []. This
  differs from 010's recorded "present" deliberately; see FS-002 spark-FS002-02. The model call is
  byte-for-byte the same regardless.

dates:
  date_original: "2026-07-22"
  date_imported: "2026-07-22"

design_ref: "R2/HW-C10-repeat-stability-design.md — executed exactly, no clause softened"
repeats_verbatim: "runs/010-sameness-assertion-arm-e"

question: >
  Six arms across four runs form a monotone gradient, and four published conclusions rest on it:
  spark-09's third step, spark-10, A6's retirement, and the claim that kinship behaviour is governed
  by the question's stance. EVERY CELL IS A SINGLE SAMPLE, at temperature 0.2, scored by one
  non-blind curator. No cell has ever been repeated. If within-cell variance is comparable to
  between-cell variance, the ladder is six draws and the four conclusions are unsupported.
  011's critique supplied a specific reason to worry: compatibility between a claim and its
  contradictions may be what INDEPENDENT GENERATION predicts, with no immunising move at all.
  A verbatim repeat is the cheapest test that separates a phenomenon from an artefact.

why_arm_e: >
  Arm E carries the most weight — spark-10, the ceiling and A6's retirement all rest on it — and its
  output is long and structured, so it exposes both SCORE stability and MECHANISM stability. Arm D
  was rejected because a null is the stable outcome by default; arm A because 009 and 010 now bound
  it from either side; arm B because nothing rests on it alone. The rung whose failure would cost
  the most is the one to test.

