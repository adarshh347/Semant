  bound_by: >
    Decisions/HW-C5-external-claim-convention.md as amended cycle 7 (section 9), AND
    Decisions/HW-C8-frame-contradicts-clarifier.md.
  columns: ["#", "verbatim", "kind", "frame status", "evidence", "speaker-flagged"]
  frame_status_values: ["frame-silent", "frame-contradicts", "stimulus-contradicts"]
  kind_values: ["name", "attribution", "date", "place", "quotation", "material", "period", "other"]
  note_on_this_pair: >
    Image 2 is a highly recognisable facade. If the model names it, that is a name row — and it is
    the FIRST test of spark-08's question-type finding on a NON-motif-framed prompt with a
    recognisable monument. Record it and compare explicitly.

provider: "groq"
model: "qwen/qwen3.6-27b"
reasoning_effort: "none"

constraints:
  no_model_calls: false
  model_budget: 2          # 1 image-bearing call + 1 reserve, provider-level failure ONLY
  retry_policy: "NO RETRIES except a provider-level failure. finish_reason length is a budget
    artifact and is NOT retried — a re-send is a second asking."
  image_call_throttle_s: 90
  max_tokens: 1100
  images_per_call: 2
  no_third_image: true
  no_named_refusal_token: true
  no_anthropomorphic_priming: true
  no_iconographic_identification: true
  no_production_mutation: true

budget_arithmetic:
  measured_constant: >
    Five two-image calls measured 3649 / 3668 / 3655 / 3633 / 3621 prompt tokens (~1794/image).
    These images are larger than 008's, so expect somewhat more; well under the 8000 TPM ceiling at
    one call per rolling minute.
  stop_condition: "If prompt_tokens exceeds 6900, report budget-blocked. Do NOT lower max_tokens."

data_safety:
  mongo_access: "find / count_documents ONLY. Nothing is written to Mongo, ever."
  adapter_reads: "LOCAL fixture files, never a production URL at call time."
  post_state_checks:
    - "Key-set equality — ABSENT != EMPTY."
    - "Length equality for every array field present."
    - "updated_at equality, to the millisecond."
    - "region_embeddings and vision_runs counts must remain 0 for both post_ids."
  any_delta_is_a_stop_condition: >
    Halt and record the delta in score.md under production_mutation with an evidence_ref. VOID.

expected_outcome_policy: >
  Both principal cells are publishable and neither is a failure. RESISTS would be the batch's FIRST
  dissent in eleven runs and would REVISE 010's framing in the model's favour — the curator's prior
  is that spark-10 replicates, and that prior must not be allowed to shade the reading. Nothing
  here graduates; everything is a SPARK.
