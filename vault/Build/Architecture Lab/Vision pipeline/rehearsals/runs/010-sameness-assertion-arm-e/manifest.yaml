# RESEARCH-ONLY single-call follow-up to runs 008 and 009. Not a new breadth family.
# Creates no production entity, route, schema, collection, or corpus write.
# This is "arm E", named in runs/009-motif-noun-isolation/score.md section 3 and
# sparks.md unresolved-question 2.
rehearsal_id: "010-sameness-assertion-arm-e"
rehearsal_type: "single-arm-isolation-followup"
family: "Instrument check (serves R12; isolates the sameness ASSERTION from the sameness DEMAND)"
mode: "instrumented"
reconstructed: false
conducted_by: "opus (execution); design and scoring marked Fable-pass in score.md"
source_condition: "present"

dates:
  date_original: "2026-07-22"
  date_imported: "2026-07-22"

design_ref: "runs/009-motif-noun-isolation/score.md section 3 (the arm E proposal)"

question: >
  Run 008 arm A DEMANDS sameness ("say which features these two share"). A6's stage 2 ASSERTS
  sameness and attributes the assertion to a third party. A demand invites the model to go find
  something; an assertion invites it to agree. Those are not the same act. This run asks the
  ASSERTION without any attribution, so that the remaining difference between this arm and A6's
  stage 2 is the ATTRIBUTION DEVICE ALONE.

the_ladder: >
  Each step moves exactly ONE thing, on byte-identical stimulus:
    arm B (008) - floor, no noun, no relational clause          -> KIN-ABSENT
    arm D (009) - noun, no relational clause                    -> KIN-ABSENT
    arm A (008) - noun + DEMAND to find sharing                 -> KIN-HEDGED
    arm E (010) - noun + ASSERTION of sharing, NO attribution   -> this run
    A6 stage 2  - noun + assertion + THIRD-PARTY ATTRIBUTION    -> not run
  Without arm E, A6's delta moves two things at once (demand->assertion AND
  no-attribution->attribution). With arm E, A6 becomes single-variable.

