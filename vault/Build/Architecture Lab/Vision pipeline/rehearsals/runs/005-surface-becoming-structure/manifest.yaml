source_notes:
  why_selected: >
    Portfolio row A4 required a NON-FIGURATIVE subject and the original nominee (6a5b91ec) turned
    out to be a photographed pencil DRAWING of figures - the fourth portfolio description found to
    be inherited detector output. This substitute restores the batch's only aniconic slot: runs
    002, 002F, 003 and 004 were all figurative.
  runs_at_native_resolution: >
    453x680 sits under the 768px probe cap, so A4 runs UNSCALED. This deliberately repairs A3's
    confound, where a 3-image call forced a 256px downscale and the model then mis-described the
    subject. One image costs ~2400 tokens, leaving ample room for max_tokens 1200.
  clean_slate: "0 regions, 0 grounds, 0 percepts, 0 embeddings - nothing pre-annotated to bias the reading"
  spark_06_test: >
    A4 doubles as the sharpest available test of spark-06 (spontaneous anthropomorphism). The
    subject is an aniconic, frontal, three-arched wall with a single lit opening on the centre
    axis - the configuration a face-inventing model would most readily seize on. Neither prompt
    mentions faces, eyes, gaze, or bodies. If a face reading appears it is unprompted, spark-06
    reaches n=2, and A6 must be redesigned. If none appears, spark-06 is bounded and A6's refusal
    test becomes more credible.
  competing_organisers_noted_before_probing: >
    Recorded in advance so the reading cannot be retrofitted: (a) a warm-lit lattice window on the
    centre axis is the only chromatic break and competes with the tiling as an organiser;
    (b) a dado band along the bottom changes to a different, finer star-and-cross pattern system;
    (c) the tilework is visibly damaged and patched in places.

provider: "groq"
model: "qwen/qwen3.6-27b"
reasoning_effort: "none"

constraints:
  technical_silence: false
  no_model_calls: false
  model_budget: 2
  retry_policy: "no retries except a provider-level failure"
  image_call_throttle_s: 30
  no_named_refusal_token: true
  no_anthropomorphic_priming: true
  no_iconographic_identification: true
  no_production_mutation: true
  time_budget: null

expected_outcome_policy: >
  Valid outcomes: (a) a SPARK about surface/structure precedence, (b) evidence that an existing
  construct suffices, (c) an honest STALL - plausible here, because pattern and built form
  announce the SAME divisions, so which organises which may be undecidable from a single
  photograph, or (d) a natural unprompted refusal. A stall is a result and must not be
  re-prompted into an answer. SPARK only; no graduation.
