<!-- Semant — the region-mark (◈), the brand's one glyph.
     A plum tile carrying a paper mark: the diamond is the frame attention draws
     around a part of an image, and the solid core is the part itself. Sized to
     read at 16px, and holds against both light and dark browser chrome.
     Palette: taste v1.3 — plum #5E2B50 on warm paper #FAF7F5. No gradients. -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <rect width="128" height="128" rx="28" fill="#5E2B50"/>
  <!-- the frame: a diamond (a square on its corner), paper stroke -->
  <rect x="64" y="20" width="62" height="62" rx="6"
        transform="rotate(45 64 20)"
        fill="none" stroke="#FAF7F5" stroke-width="7"/>
  <!-- the part it holds -->
  <rect x="64" y="44" width="28" height="28" rx="3"
        transform="rotate(45 64 44)"
        fill="#FAF7F5"/>
</svg>
