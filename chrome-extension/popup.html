<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sharirasutra</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      width: 300px;
      padding: 20px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #f8fafc 0%, #e2e8f0 100%);
    }
    
    .header {
      text-align: center;
      margin-bottom: 20px;
    }
    
    .logo {
      font-size: 24px;
      font-weight: 700;
      color: #5E2B50; /* plum v1.3 */
    }
    
    .tagline {
      font-size: 12px;
      color: #64748b;
      margin-top: 4px;
    }
    
    .instructions {
      background: white;
      border-radius: 12px;
      padding: 16px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.05);
    }
    
    .instructions h3 {
      font-size: 14px;
      color: #334155;
      margin-bottom: 12px;
    }
    
    .step {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      margin-bottom: 12px;
    }
    
    .step-number {
      width: 22px;
      height: 22px;
      background: linear-gradient(135deg, #5b9ab9 0%, #7ab8d4 100%);
      color: white;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      font-weight: 600;
      flex-shrink: 0;
    }
    
    .step-text {
      font-size: 13px;
      color: #475569;
      line-height: 1.4;
    }
    
    .open-gallery {
      display: block;
      width: 100%;
      margin-top: 16px;
      padding: 12px;
      background: linear-gradient(135deg, #5b9ab9 0%, #7ab8d4 100%);
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      text-decoration: none;
      text-align: center;
      transition: all 0.2s;
    }
    
    .open-gallery:hover {
      transform: translateY(-1px);
      box-shadow: 0 4px 12px rgba(91, 154, 185, 0.3);
    }
    
    .status {
      margin-top: 16px;
      padding: 10px;
      border-radius: 8px;
      font-size: 12px;
      text-align: center;
    }
    
    .status.connected {
      background: #dcfce7;
      color: #166534;
    }
    
    .status.disconnected {
      background: #fee2e2;
      color: #991b1b;
    }

    .api-key {
      margin-top: 16px;
      background: white;
      border-radius: 12px;
      padding: 14px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.05);
    }

    .api-key label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      color: #334155;
      margin-bottom: 8px;
    }

    .api-key input {
      width: 100%;
      padding: 9px 10px;
      border: 1px solid #cbd5e1;
      border-radius: 8px;
      font-size: 13px;
      outline: none;
    }

    .api-key input:focus {
      border-color: #5b9ab9;
    }

    .api-key button {
      width: 100%;
      margin-top: 8px;
      padding: 9px;
      background: #17121A; /* ink pill — the design language's primary */
      color: #FAF7F5;
      border: none;
      border-radius: 999px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
    }

    .mute-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 15px;
      padding: 11px 13px;
      background: #FFFFFF;
      border: 1px solid #E7E0E4;
      border-radius: 10px;
    }
    .mute-row .mute-label { font-size: 13px; font-weight: 600; color: #17121A; }
    .mute-row .mute-hint { font-size: 10.5px; color: #6C6470; margin-top: 2px; }
    .mute-row input[type="checkbox"] { width: 18px; height: 18px; accent-color: #5E2B50; cursor: pointer; }

    .key-status {
      margin-top: 8px;
      font-size: 11px;
      color: #166534;
      min-height: 14px;
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="logo">शरीरसूत्र</div>
    <div class="tagline">Visual Dictionary for Stories</div>
  </div>
  
  <div class="instructions">
    <h3>How to Save Images</h3>
    <div class="step">
      <span class="step-number">1</span>
      <span class="step-text">Browse any website normally</span>
    </div>
    <div class="step">
      <span class="step-number">2</span>
      <span class="step-text">Hover over an image you like</span>
    </div>
    <div class="step">
      <span class="step-number">3</span>
      <span class="step-text">Click the "Save to Sharirasutra" button that appears</span>
    </div>
  </div>
  
  <label class="mute-row" for="muteToggle">
    <span>
      <span class="mute-label">Mute the overlay</span>
      <div class="mute-hint">No hover toolbar while just browsing · Alt+Shift+S</div>
    </span>
    <input id="muteToggle" type="checkbox" />
  </label>

  <div class="api-key">
    <label for="backendUrlInput">Backend URL</label>
    <input id="backendUrlInput" type="text" placeholder="http://localhost:8000" autocomplete="off" spellcheck="false" />
    <button id="saveUrlBtn" type="button">Save URL</button>
  </div>

  <div class="api-key">
    <label for="apiKeyInput">API key (optional)</label>
    <input id="apiKeyInput" type="password" placeholder="X-API-Key for the backend" autocomplete="off" />
    <button id="saveKeyBtn" type="button">Save key</button>
    <div id="keyStatus" class="key-status"></div>
  </div>

  <a href="http://localhost:5173/gallery" target="_blank" class="open-gallery">
    Open Gallery
  </a>

  <div id="status" class="status">Checking connection...</div>

  <script src="popup.js"></script>
</body>
</html>
