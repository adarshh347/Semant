name: frontend

# Runs the Vitest suite on every PR into main and on pushes to main.
# The `test` job is wired in as a required status check on main (branch
# protection), so a red suite blocks the merge button.
on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

# Cancel an in-flight run when a newer commit lands on the same ref.
concurrency:
  group: frontend-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test
