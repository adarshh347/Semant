      expected_kind: instance
      acceptable_geometry: mask
      must_separate_from: [bare trees, sky]
      expected_failure_risk: low-contrast B&W boundary bleeds into the branch clutter.
      why_product_critical: the crisp subject must lift cleanly from a soft ground.
    - name: figure/ground depth order
      expected_kind: spatial
      acceptable_geometry: analysis_layer
      must_separate_from: []
